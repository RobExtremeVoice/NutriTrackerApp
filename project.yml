name: NutriTrackPro
options:
  bundleIdPrefix: com.nutritrack
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: 5.9
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  NutriTrackPro:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: NutriTrackPro
        excludes:
          - "**/*.xcconfig"
    resources:
      - path: NutriTrackPro/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nutritrack.pro
        SWIFT_EMIT_LOC_STRINGS: YES
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        INFOPLIST_FILE: NutriTrackPro/Resources/Info.plist
      configs:
        Debug:
          xcconfig: Config.xcconfig
        Release:
          xcconfig: Config.xcconfig
    info:
      path: NutriTrackPro/Resources/Info.plist
      properties:
        CFBundleDevelopmentRegion: pt_BR
        CFBundleDisplayName: NutriTrack Pro
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        NSCameraUsageDescription: "O NutriTrack Pro usa a câmera para fotografar suas refeições e analisar os nutrientes automaticamente com inteligência artificial."
        NSPhotoLibraryUsageDescription: "O NutriTrack Pro acessa sua galeria para que você possa selecionar fotos de refeições e analisar os nutrientes."
        NSPhotoLibraryAddUsageDescription: "O NutriTrack Pro salva fotos das suas refeições na galeria."
        NSHealthShareUsageDescription: "O NutriTrack Pro lê seus dados de saúde (passos e peso) para complementar seu acompanhamento nutricional."
        NSHealthUpdateUsageDescription: "O NutriTrack Pro registra suas calorias e macronutrientes no Apple Health para um acompanhamento completo da sua saúde."
        OPENAI_API_KEY: "$(OPENAI_API_KEY)"
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: NutriTrackPro/NutriTrackPro.entitlements
      properties:
        "com.apple.developer.healthkit": true
